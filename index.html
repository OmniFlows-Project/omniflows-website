<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniFlows</title>
  <meta
    name="description"
    content="OmniFlows turns fragmented AI conversations into a private knowledge tree across ChatGPT, Gemini, Grok, and the web."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
    rel="stylesheet"
  >
  <style>
    :root {
      --bg: #f3ede2;
      --bg-accent: #efe4cf;
      --surface: rgba(255, 252, 246, 0.72);
      --surface-strong: rgba(255, 250, 242, 0.92);
      --text: #1f1a14;
      --muted: #62584c;
      --line: rgba(62, 45, 24, 0.12);
      --primary: #0f766e;
      --primary-strong: #0a4f4a;
      --secondary: #d97706;
      --shadow: 0 24px 80px rgba(66, 46, 20, 0.14);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --max-width: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.18), transparent 34%),
        radial-gradient(circle at 85% 15%, rgba(217, 119, 6, 0.18), transparent 26%),
        linear-gradient(180deg, #f8f4eb 0%, #efe4cf 100%);
      font-family: "IBM Plex Sans", "Noto Sans SC", "Noto Sans JP", sans-serif;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      width: 32rem;
      height: 32rem;
      border-radius: 50%;
      filter: blur(48px);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      top: -10rem;
      right: -8rem;
      background: rgba(15, 118, 110, 0.28);
    }

    body::after {
      bottom: -12rem;
      left: -10rem;
      background: rgba(217, 119, 6, 0.24);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page-shell {
      position: relative;
      z-index: 1;
      width: min(calc(100% - 2rem), var(--max-width));
      margin: 0 auto;
      padding: 1.25rem 0 4rem;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 0 1.5rem;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 2.75rem;
      height: 2.75rem;
      border-radius: 0.95rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff8ef;
      box-shadow: 0 14px 28px rgba(15, 118, 110, 0.24);
      font-family: "Space Grotesk", sans-serif;
      font-size: 1rem;
    }

    .brand-name {
      font-family: "Space Grotesk", sans-serif;
      font-size: 1.05rem;
    }

    .lang-switcher {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 0.45rem;
    }

    .lang-button {
      border: 1px solid rgba(31, 26, 20, 0.12);
      background: rgba(255, 251, 244, 0.72);
      color: var(--muted);
      padding: 0.6rem 0.8rem;
      border-radius: 999px;
      font: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      transition: transform 180ms ease, background-color 180ms ease, color 180ms ease, border-color 180ms ease;
      backdrop-filter: blur(14px);
    }

    .lang-button:hover,
    .lang-button:focus-visible {
      transform: translateY(-1px);
      color: var(--text);
      border-color: rgba(15, 118, 110, 0.32);
      outline: none;
    }

    .lang-button.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #f8fbfa;
    }

    .hero {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(280px, 0.65fr);
      gap: 1.1rem;
      padding: clamp(1.4rem, 3vw, 2rem);
      border-radius: calc(var(--radius-xl) + 0.35rem);
      background: linear-gradient(180deg, rgba(255, 252, 247, 0.8), rgba(255, 248, 237, 0.68));
      border: 1px solid rgba(62, 45, 24, 0.08);
      box-shadow: var(--shadow);
      overflow: hidden;
      isolation: isolate;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(125deg, rgba(15, 118, 110, 0.08), transparent 42%),
        linear-gradient(330deg, rgba(217, 119, 6, 0.1), transparent 45%);
      z-index: -1;
    }

    .hero-copy {
      padding: 0.4rem;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.45rem 0.75rem;
      margin-bottom: 1rem;
      border-radius: 999px;
      background: rgba(15, 118, 110, 0.1);
      color: var(--primary-strong);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      font-family: "Space Grotesk", "IBM Plex Sans", "Noto Sans SC", "Noto Sans JP", sans-serif;
      line-height: 0.98;
    }

    h1 {
      font-size: clamp(3rem, 9vw, 6.5rem);
      letter-spacing: -0.05em;
    }

    .hero-tagline {
      margin-top: 1rem;
      font-size: clamp(1.15rem, 2.4vw, 1.65rem);
      line-height: 1.4;
      color: var(--text);
      font-weight: 500;
    }

    .hero-subtitle {
      margin-top: 1.4rem;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.75;
    }

    .hero-note {
      margin-top: 1.2rem;
      color: var(--primary-strong);
      font-size: 0.95rem;
      font-weight: 600;
    }

    .hero-visual {
      position: relative;
      min-height: 24rem;
      padding: 1rem;
      display: grid;
      place-items: center;
    }

    .tree-panel {
      position: relative;
      width: min(100%, 24rem);
      aspect-ratio: 1 / 1.08;
      padding: 1.4rem;
      border-radius: 1.8rem;
      background: linear-gradient(180deg, rgba(250, 250, 247, 0.94), rgba(247, 240, 228, 0.88));
      border: 1px solid rgba(15, 118, 110, 0.12);
      box-shadow: 0 18px 60px rgba(54, 38, 17, 0.12);
    }

    .tree-orbit {
      position: absolute;
      inset: 1.2rem;
      border-radius: 1.4rem;
      border: 1px dashed rgba(15, 118, 110, 0.16);
    }

    .node {
      position: absolute;
      padding: 0.7rem 0.85rem;
      border-radius: 1rem;
      background: var(--surface-strong);
      border: 1px solid var(--line);
      box-shadow: 0 12px 30px rgba(43, 31, 15, 0.08);
      font-size: 0.9rem;
      color: var(--text);
      backdrop-filter: blur(12px);
      animation: float 6s ease-in-out infinite;
    }

    .node strong {
      display: block;
      font-size: 0.95rem;
      color: var(--primary-strong);
      font-family: "Space Grotesk", sans-serif;
    }

    .node-a {
      top: 0.8rem;
      left: 0.8rem;
    }

    .node-b {
      top: 0.8rem;
      right: 0.8rem;
      animation-delay: -1.8s;
    }

    .node-c {
      left: -0.2rem;
      top: 50%;
      transform: translateY(-50%);
      animation-delay: -3.1s;
    }

    .node-d {
      right: -0.2rem;
      top: 50%;
      transform: translateY(-50%);
      animation-delay: -2.3s;
    }

    .node-e {
      left: 1rem;
      bottom: 0.8rem;
      animation-delay: -1.1s;
    }

    .node-f {
      right: 1rem;
      bottom: 0.8rem;
      animation-delay: -2.9s;
    }

    .node-root {
      position: absolute;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -50%);
      width: 9rem;
      height: 9rem;
      border-radius: 2rem;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 1rem;
      background: linear-gradient(135deg, rgba(15, 118, 110, 0.95), rgba(11, 86, 80, 0.92));
      color: #f6fbf9;
      box-shadow: 0 22px 44px rgba(15, 118, 110, 0.24);
    }

    .node-root::before,
    .node-root::after {
      content: "";
      position: absolute;
      width: 11rem;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(15, 118, 110, 0.32), transparent);
    }

    .node-root::after {
      transform: rotate(90deg);
    }

    .node-root strong {
      display: block;
      font-family: "Space Grotesk", sans-serif;
      font-size: 1rem;
      letter-spacing: 0.01em;
    }

    .node-root span {
      display: block;
      margin-top: 0.45rem;
      font-size: 0.9rem;
      line-height: 1.45;
      opacity: 0.9;
    }

    .vision-section {
      margin-top: 2.25rem;
      padding: 0.4rem;
    }

    .section-heading {
      display: flex;
      flex-wrap: wrap;
      align-items: end;
      justify-content: space-between;
      gap: 0.75rem 2rem;
      margin-bottom: 1.4rem;
    }

    .section-kicker {
      color: var(--secondary);
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 0.84rem;
    }

    .section-title {
      margin-top: 0.45rem;
      font-size: clamp(2rem, 4vw, 3.35rem);
      letter-spacing: -0.05em;
    }

    .section-subtitle {
      max-width: 36rem;
      color: var(--muted);
      line-height: 1.75;
    }

    .vision-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1rem;
    }

    .vision-card {
      position: relative;
      min-height: 18rem;
      padding: 1.35rem;
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, rgba(255, 252, 246, 0.86), rgba(255, 247, 236, 0.72));
      border: 1px solid rgba(62, 45, 24, 0.08);
      box-shadow: 0 16px 44px rgba(51, 37, 18, 0.08);
      overflow: hidden;
      transform: translateY(18px);
      opacity: 0;
      animation: reveal 720ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .vision-card:nth-child(2) {
      animation-delay: 120ms;
    }

    .vision-card:nth-child(3) {
      animation-delay: 240ms;
    }

    .vision-card::before {
      content: "";
      position: absolute;
      width: 11rem;
      height: 11rem;
      right: -4rem;
      top: -4rem;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(15, 118, 110, 0.16), transparent 68%);
    }

    .vision-index {
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.85rem;
      color: var(--primary-strong);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .vision-title {
      margin-top: 1.1rem;
      font-size: 1.65rem;
      letter-spacing: -0.04em;
      line-height: 1.05;
    }

    .vision-title small {
      display: block;
      margin-top: 0.5rem;
      font-family: "IBM Plex Sans", "Noto Sans SC", "Noto Sans JP", sans-serif;
      font-size: 0.98rem;
      line-height: 1.5;
      color: var(--secondary);
      letter-spacing: normal;
    }

    .vision-body {
      position: relative;
      margin-top: 1rem;
      color: var(--muted);
      line-height: 1.78;
      font-size: 0.98rem;
    }

    .footer-note {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-top: 2rem;
      padding: 1rem 0.25rem 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .footer-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--primary-strong);
      font-weight: 600;
    }

    .site-footer {
      margin-top: 2.75rem;
      padding: 1.5rem 0.4rem 0;
      border-top: 1px solid rgba(62, 45, 24, 0.12);
      text-align: center;
    }

    .site-footer-line {
      font-family: "Space Grotesk", "IBM Plex Sans", "Noto Sans SC", "Noto Sans JP", sans-serif;
      font-size: clamp(1rem, 2vw, 1.3rem);
      line-height: 1.5;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .site-footer-line + .site-footer-line {
      margin-top: 0.35rem;
      color: var(--muted);
    }

    @keyframes reveal {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes float {
      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-6px);
      }
    }

    @media (max-width: 980px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .hero-tagline,
      h1 {
        max-width: none;
      }

      .vision-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .page-shell {
        width: min(calc(100% - 1rem), var(--max-width));
        padding-top: 0.6rem;
      }

      .topbar,
      .footer-note,
      .section-heading {
        align-items: flex-start;
        flex-direction: column;
      }

      .lang-switcher {
        justify-content: flex-start;
      }

      .hero,
      .tree-panel,
      .vision-card {
        border-radius: 1.4rem;
      }

      .hero-visual {
        min-height: 21rem;
      }

      .node {
        padding: 0.6rem 0.72rem;
        font-size: 0.83rem;
      }

      .node-root {
        width: 8rem;
        height: 8rem;
      }
    }
  </style>
</head>

            <p class="vision-body" data-i18n="card3Body"></p>

        </div>

        <div class="footer-note">

        </div>

        <footer class="site-footer">
          <div class="site-footer-line">Built with ❤️ for Lifelong Learners | v0.1 Alpha</div>
          <div class="site-footer-line">© 2026 OmniFlows.net - Building in Public</div>
        </footer>
      </section>
    </main>
  </div>

    const supportedLanguages = Object.keys(translations);
    const defaultLanguage = (() => {
      const savedLanguage = window.localStorage.getItem("omniflows-language");
      if (savedLanguage && supportedLanguages.includes(savedLanguage)) {
        return savedLanguage;
      }

      const browserLanguage = (navigator.language || "en").toLowerCase();
      if (browserLanguage.startsWith("zh")) {
        return "zh";
      }
      if (browserLanguage.startsWith("fr")) {
        return "fr";
      }
      if (browserLanguage.startsWith("de")) {
        return "de";
      }
      if (browserLanguage.startsWith("ja")) {
        return "ja";
      }
      return "en";
    })();

    const buttons = Array.from(document.querySelectorAll(".lang-button"));
    const nodes = Array.from(document.querySelectorAll("[data-i18n]"));

    function setLanguage(language) {
      const selectedLanguage = translations[language] ? language : "en";
      const dictionary = translations[selectedLanguage];

      document.documentElement.lang = selectedLanguage;

      nodes.forEach((node) => {
        const key = node.dataset.i18n;
        if (dictionary[key]) {
          node.textContent = dictionary[key];
        }
      });

      buttons.forEach((button) => {
        const isActive = button.dataset.lang === selectedLanguage;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });

      window.localStorage.setItem("omniflows-language", selectedLanguage);
    }

    buttons.forEach((button) => {
      button.addEventListener("click", () => {
        setLanguage(button.dataset.lang);
      });
    });

    setLanguage(defaultLanguage);
  </script>
